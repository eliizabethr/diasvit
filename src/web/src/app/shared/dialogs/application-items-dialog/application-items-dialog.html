<div class="items-dialog">
  <h2 class="items-dialog__title">
    Список товарів у заявці {{ applicationNumber() }}
  </h2>

  <div class="items-dialog__table-wrapper">
    <table class="items-dialog__table">
      <thead>
        <tr>
          <th>Назва</th>
          <th>Кількість</th>
        </tr>
      </thead>

      <tbody>
        @for (applicationItem of items(); track applicationItem.id) {
          <tr>
            <td>{{ applicationItem.name }}</td>
            <td>{{ applicationItem.quantity }} {{ applicationItem.unit }}</td>
          </tr>
        }
      </tbody>
    </table>
  </div>

  <div class="items-dialog__actions">
    <button type="button" mat-flat-button class="items-dialog__primary" (click)="close()">
      Зрозуміло
    </button>
  </div>
</div>
