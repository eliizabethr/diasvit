<div class="auth-layout">
  <main
    class="auth-layout__card"
    [class.auth-layout__card--wide]="cardSize() === 'wide'"
  >
    <a class="auth-layout__logo" routerLink="/" aria-label="Діасвіт Запоріжжя">
      <img src="/images/logo.svg" alt="" />
    </a>

    <header class="auth-layout__header">
      <h1 class="auth-layout__title">{{ title() }}</h1>

      @if (subtitle()) {
        <p class="auth-layout__subtitle">
          {{ subtitle() }}
        </p>
      }
    </header>

    <section class="auth-layout__content">
      <ng-content></ng-content>
    </section>

    @if (footerText() && footerLinkText() && footerLink()) {
      @if (showFooterDivider()) {
        <div class="auth-layout__divider">
          <span>або</span>
        </div>
      }

      <footer class="auth-layout__footer">
        <span>{{ footerText() }}</span>
        <a [routerLink]="footerLink()">{{ footerLinkText() }}</a>
      </footer>
    }
  </main>
</div>
