name: CD

on:
  push:
    branches:
      - main
      - 'release/**'

jobs:
  determine-environment:
    name: Determine deployment environment
    runs-on: ubuntu-latest

    outputs:
      environment: ${{ steps.set-env.outputs.environment }}

    steps:
      - name: Determine environment by branch
        id: set-env
        run: |
          if [[ "${GITHUB_REF_NAME}" == "main" ]]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
          elif [[ "${GITHUB_REF_NAME}" == release/* ]]; then
            echo "environment=staging" >> "$GITHUB_OUTPUT"
          else
            echo "environment=none" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build application
    runs-on: ubuntu-latest
    needs: determine-environment

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js for backend
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/api/package-lock.json

      - name: Install API dependencies
        working-directory: src/api
        run: npm ci

      - name: Build API
        working-directory: src/api
        run: npm run build

      - name: Prune development dependencies
        working-directory: src/api
        run: |
          # 1. Clean out the heavy development packages from node_modules
          npm prune --omit=dev
          
          # 2. Move package.json and node_modules into dist so it's a self-contained app
          cp package.json dist/
          cp -r node_modules dist/

      - name: Setup Node.js for Web
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/web/package-lock.json

      - name: Install Web dependencies
        working-directory: src/web
        run: npm ci

      - name: Build Web for staging
        if: needs.determine-environment.outputs.environment == 'staging'
        working-directory: src/web
        run: npm run build:staging

      - name: Build Web for production
        if: needs.determine-environment.outputs.environment == 'production'
        working-directory: src/web
        run: npm run build:production

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-build
          path: src/api/dist

      - name: Upload Web artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: src/web/dist/diasvit-web/browser

  deploy-staging-placeholder:
    name: Deploy to Staging placeholder
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - build

    if: needs.determine-environment.outputs.environment == 'staging'

    environment:
      name: staging

    steps:
      - name: Deployment
        run: |
          echo "Staging deployment"

  migrate-database-production:
    name: Run Production Database Migrations
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - build

    if: needs.determine-environment.outputs.environment == 'production'

    environment:
      name: production

    defaults:
      run:
        working-directory: src/api

    env:
      NODE_ENV: production
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_USERNAME: ${{ secrets.DB_USERNAME }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      DB_DATABASE: ${{ secrets.DB_DATABASE }}
      DB_LOGGING: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/api/package-lock.json

      - name: Install backend dependencies
        run: npm ci

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Get runner IP and add firewall rule
        run: |
          RUNNER_IP=$(curl -s https://api.ipify.org)
          echo "Runner IP: $RUNNER_IP"
          az sql server firewall-rule create \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server ${{ vars.AZURE_SQL_SERVER }} \
            --name "github-runner-${{ github.run_id }}" \
            --start-ip-address $RUNNER_IP \
            --end-ip-address $RUNNER_IP

      - name: Run TypeORM migrations on production database
        run: npm run migration:run

      - name: Remove firewall rule
        if: always()   # runs even if migration fails
        run: |
          az sql server firewall-rule delete \
            --resource-group ${{ vars.AZURE_RESOURCE_GROUP }} \
            --server ${{ vars.AZURE_SQL_SERVER }} \
            --name "github-runner-${{ github.run_id }}"

  deploy-api-production:
    name: Deploy API to Production
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - build
      - migrate-database-production

    if: needs.determine-environment.outputs.environment == 'production'

    environment:
      name: production

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: api-build
          path: api-dist

      - name: Deploy API to Azure App Service
        uses: azure/webapps-deploy@v3
        with:
          app-name: app-diasvit-prd-weu-01
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ./api-dist

  deploy-web-production:
    name: Deploy Web to Production
    runs-on: ubuntu-latest
    needs:
      - determine-environment
      - build
      - migrate-database-production

    if: needs.determine-environment.outputs.environment == 'production'

    environment:
      name: production

    steps:
      - name: Download Web artifact
        uses: actions/download-artifact@v4
        with:
          name: web-build
          path: web-dist

      - name: Deploy Web to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_DEPLOYMENT_TOKEN }}
          action: upload
          skip_app_build: true
          app_location: web-dist
          output_location: ""
